title: Tech Wiki
description: A comprehensive wiki for all tech stuff

# Theme settings - Just the Docs provides modern wiki-style layout
remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Color scheme (dark/light) - default to dark for modern look
color_scheme: dark

# Logo (optional - add logo.png to assets if desired)
# logo: "/assets/images/logo.png"

# Search settings
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation structure
nav_enabled: true

# Footer content
footer_content: "&copy; 2026 Tech Wiki. A comprehensive wiki for all tech stuff."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# External navigation links (top header)
aux_links:
  "Docs":
    - "/"
  "Contribute":
    - "/contributing"

aux_links_new_tab: false

# Callout support
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  important:
    title: Important
    color: green

# Enable heading anchors
heading_anchors: true

# Collections for organizing content
collections:
  docs:
    permalink: "/:path/"
    output: true

# Just the Docs settings
just_the_docs:
  collections:
    docs:
      name: Documentation
      nav_fold: false

# GA4 (optional)
# ga_tracking: G-XXXXXXXXXX
