<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a371f7"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>
  <!-- Book/wiki icon -->
  <g transform="translate(12, 10)" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left page -->
    <path d="M20 4 C14 2, 4 2, 2 4 L2 36 C4 34, 14 34, 20 36" fill="rgba(255,255,255,0.15)"/>
    <!-- Right page -->
    <path d="M20 4 C26 2, 36 2, 38 4 L38 36 C36 34, 26 34, 20 36" fill="rgba(255,255,255,0.15)"/>
    <!-- Spine -->
    <line x1="20" y1="4" x2="20" y2="36"/>
    <!-- Code brackets on left page -->
    <text x="7" y="22" font-family="monospace" font-size="12" fill="#ffffff" stroke="none" font-weight="bold">&lt;/&gt;</text>
    <!-- Gear on right page -->
    <circle cx="30" cy="20" r="4" stroke="#ffffff" stroke-width="2" fill="none"/>
    <circle cx="30" cy="20" r="1.5" fill="#ffffff" stroke="none"/>
    <!-- Gear teeth -->
    <line x1="30" y1="14" x2="30" y2="16"/>
    <line x1="30" y1="24" x2="30" y2="26"/>
    <line x1="24" y1="20" x2="26" y2="20"/>
    <line x1="34" y1="20" x2="36" y2="20"/>
  </g>
  <!-- TW text at bottom -->
  <text x="32" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#ffffff" text-anchor="middle" font-weight="700" letter-spacing="1">TW</text>
</svg>
